<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Catgirl Royale Online</title>
  <meta name="viewport" content="width=800, user-scalable=no">
  <link rel="icon" type="image/png" href="https://coe-chat.vercel.app/royale/Catgirl_Royale_favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
  <style>
    :root {
      --cat-pink: #ffb6c1;
      --cat-blue: #4fc3f7;
      --cat-purple: #a259e6;
      --cat-orange: #ffb347;
      --cat-green: #7fff7f;
      --bg-gradient: linear-gradient(135deg, #ffb6c1 0%, #4fc3f7 100%);
      --panel-bg: #fffafd;
      --panel-bg2: #f7faff;
      --shadow: 0 8px 32px #4fc3f766;
      --radius: 28px;
      font-size: 18px;
    }
    body {
      font-family: 'Geologica', Arial, sans-serif;
      background: var(--bg-gradient);
      color: #444;
      margin: 0;
      min-height: 100vh;
      box-sizing: border-box;
      letter-spacing: 0.02em;
      overflow-x: hidden;
    }
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 18px 24px 18px;
      background: var(--panel-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-width: 430px;
      margin: 28px auto 0 auto;
      position: relative;
    }
    .active {
      display: flex !important;
      animation: fadeIn 0.6s;
    }
    @keyframes fadeIn { from {opacity:0;transform:scale(0.98);} to{opacity:1;transform:scale(1);} }
    .logo {
      margin-bottom: 12px;
      max-width: 240px;
      border-radius: 18px;
      box-shadow: 0 0 20px #ffb6c199;
      display: block;
    }
    h1, h2, h3 {
      font-weight: 700;
      margin: 0 0 22px 0;
      letter-spacing: 0.04em;
      font-family: 'Geologica', Arial, sans-serif;
    }
    h1 { font-size: 2.3em;}
    h2 { font-size: 1.4em;}
    label {
      font-size: 1em;
      margin-bottom: 7px;
      font-weight: 500;
      color: #567;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    input, select {
      font-family: 'Geologica', Arial, sans-serif;
      font-size: 1em;
      padding: 8px 14px;
      border-radius: 14px;
      border: 2px solid #e3e3e3;
      background: #fff;
      margin-bottom: 8px;
      outline: none;
      transition: border-color 0.18s;
      box-shadow: 0 2px 8px #f3f3f3;
    }
    select { min-width: 120px;}
    input:focus, select:focus { border-color: var(--cat-blue);}
    .btn {
      font-family: 'Geologica', Arial, sans-serif;
      font-size: 1.06em;
      font-weight: 700;
      padding: 14px 38px;
      background: var(--cat-blue);
      color: #fff;
      border: none;
      border-radius: 20px;
      box-shadow: 0 2px 8px #4fc3f722;
      cursor: pointer;
      margin-top: 10px;
      margin-bottom: 8px;
      transition: background 0.18s;
      outline: none;
      letter-spacing: 0.04em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn.pink {background: var(--cat-pink);}
    .btn:active {background: #aeefff;}
    .btn.pink:active {background: #ffd6e8;}
    .btn .material-symbols-rounded {font-size: 1.3em;}
    .panel {
      background: var(--panel-bg2);
      border-radius: var(--radius);
      box-shadow: 0 4px 18px #4fc3f733;
      padding: 22px 18px;
      margin-bottom: 18px;
      width: 100%;
      max-width: 355px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .player-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 10px;
      margin-top: 6px;
      width: 100%;
    }
    .player-list .player {
      font-size: 1.2em;
      padding: 10px 0 10px 0;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 2px 8px #4fc3f711;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      color: #222;
      letter-spacing: 0.04em;
      border-left: 11px solid var(--cat-blue);
    }
    .player-list .creator {background: #e7faff; border-left: 11px solid var(--cat-pink);}
    .lobby-code {
      font-size: 1.5em;
      background: #fff;
      border-radius: 12px;
      padding: 6px 22px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 0.18em;
      border: 2px solid var(--cat-blue);
      color: var(--cat-blue);
      box-shadow: 0 1px 8px #4fc3f711;
      user-select: all;
    }
    .game-tips {
      font-size: 0.97em;
      color: #888;
      text-align: left;
      margin-bottom: 10px;
      margin-top: 10px;
      padding: 5px 6px;
    }
    .cat-select {
      display: flex; gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }
    .cat-color {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid #eee;
      box-shadow: 0 1px 8px #2222; cursor: pointer; outline: none; 
      margin-right: 10px;
    }
    .cat-color.selected { border: 2.5px solid var(--cat-blue);}
    .material-symbols-rounded {
      font-family: 'Material Symbols Rounded';
      font-weight: normal;
      font-style: normal;
      font-size: 1.25em;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      direction: ltr;
      vertical-align: middle;
      font-feature-settings: 'liga';
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }
    .canvas-panel {
      background: var(--panel-bg2);
      border-radius: var(--radius);
      box-shadow: 0 6px 32px #4fc3f799;
      padding: 12px;
      margin-top: 28px;
      margin-bottom: 28px;
      max-width: 850px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #game {
      border: 5px solid #fff;
      border-radius: 22px;
      box-shadow: 0 0 32px #4fc3f733;
      background: #f7faff;
      margin-top: 12px;
      margin-bottom: 12px;
      display: block; 
    }
    @media (max-width: 900px) {
      .canvas-panel {padding: 3vw;}
      #game {width:90vw !important; height:67vw !important;}
    }
    .rematch-btn {
      margin-top: 32px;
      background: var(--cat-pink);
      font-size: 1.2em;
      padding: 14px 44px;
      border-radius: 22px;
      border: none;
      box-shadow: 0 2px 8px #ffb6c122;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s;
    }
    .rematch-btn:active {background: #ffd6e8;}
    .hide {display:none !important;}
    ::-webkit-scrollbar {
      width: 9px;
      background: #f7faff;
      border-radius: 12px;
    }
    ::-webkit-scrollbar-thumb {
      background: #ffb6c1;
      border-radius: 12px;
    }
  </style>
</head>
<body>
<!-- ALL SCREENS -->
<div id="ss1-mode-select" class="screen active">
  <img class="logo" src="https://coe-chat.vercel.app/royale/Catgirl_Royale_Logo.png" alt="Catgirl Royale Logo">
  <h1>Catgirl Royale</h1>
  <div class="panel">
    <button class="btn pink" onclick="startOffline()">
      <span class="material-symbols-rounded">videogame_asset</span>
      Offline Mode
    </button>
    <button class="btn" onclick="startOnline()">
      <span class="material-symbols-rounded">public</span>
      Online Mode
    </button>
  </div>
  <div class="game-tips">
    <b>Offline:</b> WASD/E for Player 1, Arrow Keys + M for Player 2.<br>
    <b>Online:</b> All players use WASD/E.<br>
  </div>
</div>
<div id="ss2-player-info" class="screen">
  <img class="logo" src="https://coe-chat.vercel.app/royale/Catgirl_Royale_Logo.png" alt="Catgirl Royale Logo">
  <h2>Name & Color</h2>
  <div class="panel">
    <label for="onlineName">
      <span class="material-symbols-rounded">person</span>
      Your Name
    </label>
    <input id="onlineName" type="text" maxlength="16" value="" autocomplete="off">
    <label for="onlineColor">
      <span class="material-symbols-rounded">palette</span>
      Catgirl Color
    </label>
    <div class="cat-select">
      <div class="cat-color" style="background:var(--cat-pink)" onclick="selectCatColor('#ffb6c1')" id="cat-pink"></div>
      <div class="cat-color" style="background:var(--cat-blue)" onclick="selectCatColor('#4fc3f7')" id="cat-blue"></div>
      <div class="cat-color" style="background:var(--cat-purple)" onclick="selectCatColor('#a259e6')" id="cat-purple"></div>
      <div class="cat-color" style="background:var(--cat-orange)" onclick="selectCatColor('#ffb347')" id="cat-orange"></div>
      <div class="cat-color" style="background:var(--cat-green)" onclick="selectCatColor('#7fff7f')" id="cat-green"></div>
    </div>
    <input id="onlineColor" type="hidden" value="#ffb6c1">
    <button class="btn" onclick="confirmPlayerInfo()">
      <span class="material-symbols-rounded">check_circle</span>
      Confirm
    </button>
  </div>
</div>
<div id="ss3-create-join" class="screen">
  <img class="logo" src="https://coe-chat.vercel.app/royale/Catgirl_Royale_Logo.png" alt="Catgirl Royale Logo">
  <h2>Online: Create or Join</h2>
  <div class="panel">
    <button class="btn pink" onclick="createGame()">
      <span class="material-symbols-rounded">add_circle</span>
      Create Game
    </button>
    <button class="btn" onclick="showJoinScreen()">
      <span class="material-symbols-rounded">login</span>
      Join Game
    </button>
  </div>
</div>
<div id="ss4-join-game" class="screen">
  <img class="logo" src="https://coe-chat.vercel.app/royale/Catgirl_Royale_Logo.png" alt="Catgirl Royale Logo">
  <h2>Join Game</h2>
  <div class="panel">
    <label for="joinCode">
      <span class="material-symbols-rounded">key</span>
      Game Code
    </label>
    <input id="joinCode" type="text" maxlength="8" autocomplete="off" style="width:160px;">
    <button class="btn" onclick="joinGame()">
      <span class="material-symbols-rounded">login</span>
      Join
    </button>
  </div>
</div>
<div id="lobby" class="screen">
  <img class="logo" src="https://coe-chat.vercel.app/royale/Catgirl_Royale_Logo.png" alt="Catgirl Royale Logo">
  <h2>Lobby</h2>
  <div class="panel" style="align-items:center;">
    <div class="lobby-code" id="lobbyCode"></div>
    <div class="player-list" id="playerList"></div>
    <button class="btn pink" id="startBtn" onclick="startGame()" style="display:none;">
      <span class="material-symbols-rounded">play_arrow</span>
      Start Game
    </button>
    <div class="game-tips">
      <span class="material-symbols-rounded" style="font-size:1.2em;">info</span>
      Share code & wait for up to 4 players. Only creator can start. 
    </div>
  </div>
</div>
<div id="offlineSetup" class="screen">
  <img class="logo" src="https://coe-chat.vercel.app/royale/Catgirl_Royale_Logo.png" alt="Catgirl Royale Logo">
  <h2>Local Multiplayer</h2>
  <div class="panel">
    <label>Player 1 Name</label>
    <input id="p1name" value="Player 1" maxlength="16">
    <label>Player 1 Color</label>
    <div class="cat-select" id="p1cat-select">
      <div class="cat-color" style="background:var(--cat-pink)" onclick="selectOfflineCatColor(1, '#ffb6c1')" id="p1cat-pink"></div>
      <div class="cat-color" style="background:var(--cat-blue)" onclick="selectOfflineCatColor(1, '#4fc3f7')" id="p1cat-blue"></div>
      <div class="cat-color" style="background:var(--cat-purple)" onclick="selectOfflineCatColor(1, '#a259e6')" id="p1cat-purple"></div>
      <div class="cat-color" style="background:var(--cat-orange)" onclick="selectOfflineCatColor(1, '#ffb347')" id="p1cat-orange"></div>
      <div class="cat-color" style="background:var(--cat-green)" onclick="selectOfflineCatColor(1, '#7fff7f')" id="p1cat-green"></div>
    </div>
    <input id="p1color" type="hidden" value="#ffb6c1">
    <label>Player 2 Name</label>
    <input id="p2name" value="Player 2" maxlength="16">
    <label>Player 2 Color</label>
    <div class="cat-select" id="p2cat-select">
      <div class="cat-color" style="background:var(--cat-pink)" onclick="selectOfflineCatColor(2, '#ffb6c1')" id="p2cat-pink"></div>
      <div class="cat-color" style="background:var(--cat-blue)" onclick="selectOfflineCatColor(2, '#4fc3f7')" id="p2cat-blue"></div>
      <div class="cat-color" style="background:var(--cat-purple)" onclick="selectOfflineCatColor(2, '#a259e6')" id="p2cat-purple"></div>
      <div class="cat-color" style="background:var(--cat-orange)" onclick="selectOfflineCatColor(2, '#ffb347')" id="p2cat-orange"></div>
      <div class="cat-color" style="background:var(--cat-green)" onclick="selectOfflineCatColor(2, '#7fff7f')" id="p2cat-green"></div>
    </div>
    <input id="p2color" type="hidden" value="#4fc3f7">
    <button class="btn pink" onclick="startOfflineGame()">Start Game</button>
  </div>
  <div class="game-tips">
    WASD/E for Player 1<br>Arrow Keys + M for Player 2
  </div>
</div>
<div id="game-panel" class="canvas-panel hide">
  <canvas id="game" width="800" height="600"></canvas>
</div>
<div id="deathScreen" class="screen" style="z-index:30;display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;align-items:center;justify-content:center;background:rgba(255,255,255,0.93);">
  <h1 id="winnerText"></h1>
  <button class="rematch-btn" onclick="rematch()">
    <span class="material-symbols-rounded">restart_alt</span>
    Rematch
  </button>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="script.js">
</script>
</body>
</html>
